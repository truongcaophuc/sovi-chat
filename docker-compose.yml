services:
  sovi-chat:
    build:
      context: .
      dockerfile: Dockerfile
    image: sovi-chat:latest
    container_name: sovi-chat
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Override individual values here, or use env_file below to load .env wholesale.
      NODE_ENV: production
      PORT: 3000
      # If RUN_DB_PUSH=0, skip auto schema sync on startup
      RUN_DB_PUSH: "1"
    env_file:
      - .env
    # Uncomment if your Postgres is on the host network (not in this compose):
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/login >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

